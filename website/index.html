<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Face ID Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* Основен фон */
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #111827, #000000);
      color: #f9fafb;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout {
      display: flex;
      gap: 32px;
      padding: 24px;
      max-width: 1100px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ==== AUTH CARD (LOGIN + REGISTER) ==== */

    .auth-card {
      width: 360px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.3);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .auth-tabs {
      display: flex;
      background: linear-gradient(90deg, #0f172a, #020617);
      border-bottom: 1px solid rgba(148, 163, 184, 0.3);
    }

    .auth-tab {
      flex: 1;
      padding: 12px 0;
      background: transparent;
      border: none;
      color: #9ca3af;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-tab.active {
      color: #e5e7eb;
      border-bottom: 2px solid #38bdf8;
      background: rgba(15, 23, 42, 0.9);
    }

    .auth-forms {
      padding: 20px 24px 24px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
    }

    .auth-form.hidden {
      display: none;
    }

    .auth-form h2 {
      margin: 0 0 16px;
      font-size: 1.3rem;
      font-weight: 600;
      color: #e5e7eb;
    }

    .auth-field {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }

    .auth-field label {
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #9ca3af;
    }

    .auth-field input {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background-color: #020617;
      color: #f9fafb;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .auth-field input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px #38bdf8;
    }

    .auth-button {
      border: none;
      border-radius: 999px;
      padding: 9px 0;
      margin-top: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    }

    .auth-button.primary {
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #0f172a;
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
    }

    .auth-button.secondary {
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #4b5563;
    }

    .auth-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }

    .auth-button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .auth-message {
      min-height: 18px;
      margin-top: 6px;
      font-size: 0.85rem;
    }

    .auth-message.success {
      color: #22c55e;
    }

    .auth-message.error {
      color: #f97316;
    }

    /* ==== UPLOAD + DETECTION CARD ==== */

    .panel-card {
      width: 420px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(52, 211, 153, 0.35);
      padding: 20px 24px 24px;
      backdrop-filter: blur(10px);
      position: relative;
    }

    .panel-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      background: conic-gradient(
        from 180deg,
        rgba(56, 189, 248, 0.4),
        rgba(45, 212, 191, 0.3),
        transparent,
        rgba(56, 189, 248, 0.4)
      );
      opacity: 0.2;
      z-index: -1;
    }

    .panel-title {
      margin: 0 0 16px;
      font-size: 1.25rem;
      font-weight: 600;
      color: #e5e7eb;
    }

    .panel-subtitle {
      margin: 0 0 16px;
      font-size: 0.9rem;
      color: #9ca3af;
    }

    .upload-area {
      border: 1px dashed #4b5563;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      background: rgba(15, 23, 42, 0.7);
      margin-bottom: 16px;
    }

    .upload-area input[type="file"] {
      margin-top: 8px;
    }

    .panel-button {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .panel-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
    }

    .panel-button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .result-section {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #e5e7eb;
    }

    .result-section pre {
      background: #020617;
      padding: 8px;
      border-radius: 8px;
      max-height: 200px;
      overflow: auto;
      font-size: 0.8rem;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="layout">

      <!-- AUTH CARD -->
      <div class="auth-card">
        <div class="auth-tabs">
          <button id="tab-login" class="auth-tab active">Login</button>
          <button id="tab-register" class="auth-tab">Register</button>
        </div>

        <div class="auth-forms">
          <!-- LOGIN FORM -->
          <form id="login-form" class="auth-form">
            <h2>Welcome back</h2>
            <div class="auth-field">
              <label for="login-username">Username</label>
              <input type="text" id="login-username" name="username" required />
            </div>
            <div class="auth-field">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" name="password" required />
            </div>
            <button type="submit" class="auth-button primary">Login</button>
            <p id="login-message" class="auth-message"></p>
          </form>

          <!-- REGISTER FORM -->
          <form id="register-form" class="auth-form hidden">
            <h2>Create account</h2>
            <div class="auth-field">
              <label for="register-username">Username</label>
              <input type="text" id="register-username" name="username" required />
            </div>
            <div class="auth-field">
              <label for="register-password">Password</label>
              <input type="password" id="register-password" name="password" required />
            </div>
            <div class="auth-field">
              <label for="register-role">Role (optional)</label>
              <input type="text" id="register-role" name="role" placeholder="USER" />
            </div>
            <button type="submit" class="auth-button secondary">Register</button>
            <p id="register-message" class="auth-message"></p>
          </form>
        </div>
      </div>

      <!-- UPLOAD + DETECT CARD -->
      <div id="upload-detect-card" class="panel-card hidden">
        <h2 class="panel-title">Face Detection</h2>
        <p class="panel-subtitle">
          Качи снимка от компютъра си. Сървърът ще я запази и локалният модел ще провери дали има лице.
        </p>

        <div class="upload-area">
          <div>Избери файл (снимка):</div>
          <input type="file" id="upload-file-input" accept="image/*" />
          <button id="upload-analyze-btn" class="panel-button">Качи и анализирай</button>
          <p id="upload-message" class="auth-message"></p>
        </div>

        <div class="result-section">
          <div id="detect-summary"></div>
          <pre id="detect-raw-json"></pre>
        </div>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // ===== Tabs =====
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');

      function showLogin() {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      }

      function showRegister() {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }

      if (tabLogin && tabRegister && loginForm && registerForm) {
        tabLogin.addEventListener('click', showLogin);
        tabRegister.addEventListener('click', showRegister);
      }

      // ===== LOGIN & AUTH STATE =====
      const loginMessage = document.getElementById('login-message');
      const uploadDetectCard = document.getElementById('upload-detect-card');
      const authCard = document.querySelector('.auth-card');

      let isLoggedIn = false;

      function onAuthSuccess(message) {
        isLoggedIn = true;

        if (uploadDetectCard) {
          uploadDetectCard.classList.remove('hidden');
        }

        if (authCard) {
          authCard.classList.add('hidden');
        }

        if (loginMessage) {
          loginMessage.textContent = message || 'Успешен вход.';
          loginMessage.className = 'auth-message success';
        }
      }

      if (loginForm) {
        loginForm.addEventListener('submit', async function (e) {
          e.preventDefault();
          const username = document.getElementById('login-username').value.trim();
          const password = document.getElementById('login-password').value.trim();

          if (!username || !password) {
            loginMessage.textContent = 'Моля, въведи име и парола.';
            loginMessage.className = 'auth-message error';
            return;
          }

          try {
            const response = await fetch('http://localhost:8080/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password })
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
              loginMessage.textContent = data.error || 'Грешно потребителско име или парола.';
              loginMessage.className = 'auth-message error';
              return;
            }

            onAuthSuccess(data.message || 'Успешен вход.');

          } catch (err) {
            loginMessage.textContent = 'Грешка при връзка със сървъра: ' + err.message;
            loginMessage.className = 'auth-message error';
          }
        });
      }

      // ===== REGISTER =====
      const registerMessage = document.getElementById('register-message');

      if (registerForm) {
        registerForm.addEventListener('submit', async function (e) {
          e.preventDefault();

          const username = document.getElementById('register-username').value.trim();
          const password = document.getElementById('register-password').value.trim();
          const role = document.getElementById('register-role').value.trim() || 'USER';

          if (!username || !password) {
            registerMessage.textContent = 'Моля, въведи име и парола.';
            registerMessage.className = 'auth-message error';
            return;
          }

          try {
            const response = await fetch('http://localhost:8080/api/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username, password, role })
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
              registerMessage.textContent = data.error || 'Грешка при регистрация.';
              registerMessage.className = 'auth-message error';
              return;
            }

            registerMessage.textContent = data.message || 'Успешна регистрация.';
            registerMessage.className = 'auth-message success';

            setTimeout(() => {
              showLogin();
              onAuthSuccess('Регистрация успешна – влезе автоматично.');
            }, 1000);

          } catch (err) {
            registerMessage.textContent = 'Грешка при връзка със сървъра: ' + err.message;
            registerMessage.className = 'auth-message error';
          }
        });
      }

      // ===== UPLOAD & DETECT =====
      const uploadInput = document.getElementById('upload-file-input');
      const uploadBtn = document.getElementById('upload-analyze-btn');
      const uploadMessage = document.getElementById('upload-message');
      const detectSummary = document.getElementById('detect-summary');
      const detectRawJson = document.getElementById('detect-raw-json');

      async function uploadAndDetect() {
        if (!isLoggedIn) {
          uploadMessage.textContent = 'Моля, първо се впиши или регистрирай.';
          uploadMessage.className = 'auth-message error';
          return;
        }

        if (!uploadInput || !uploadInput.files || uploadInput.files.length === 0) {
          uploadMessage.textContent = 'Моля, избери файл.';
          uploadMessage.className = 'auth-message error';
          return;
        }

        const file = uploadInput.files[0];

        try {
          const formData = new FormData();
          formData.append('file', file);

          uploadMessage.textContent = 'Качване...';
          uploadMessage.className = 'auth-message';

          const uploadRes = await fetch('http://localhost:8080/api/images/upload', {
            method: 'POST',
            body: formData
          });

          const uploadData = await uploadRes.json().catch(() => ({}));

          if (!uploadRes.ok) {
            uploadMessage.textContent = uploadData.error || 'Грешка при качване.';
            uploadMessage.className = 'auth-message error';
            return;
          }

          uploadMessage.textContent = uploadData.message || 'Файлът е качен.';
          uploadMessage.className = 'auth-message success';

          const fileName = uploadData.fileName;
          if (!fileName) {
            uploadMessage.textContent = 'Сървърът не върна fileName.';
            uploadMessage.className = 'auth-message error';
            return;
          }

          detectSummary.textContent = 'Анализ...';
          detectRawJson.textContent = '';

          const detectRes = await fetch(
            'http://localhost:8080/api/face/detect-uploaded?fileName=' + encodeURIComponent(fileName),
            { method: 'POST' }
          );

          const detectData = await detectRes.json().catch(() => ({}));

          if (!detectRes.ok) {
            detectSummary.textContent = 'Грешка при анализ: ' + (detectData || '');
            return;
          }

          if (detectData.hasFace) {
            const rect = detectData.faceRectangle || {};
            detectSummary.textContent =
              'Открито лице. Позиция: top=' + rect.top + ', left=' + rect.left +
              ', width=' + rect.width + ', height=' + rect.height + '.';
          } else {
            detectSummary.textContent = detectData.message || 'Не е открито лице.';
          }

          detectRawJson.textContent = JSON.stringify(detectData, null, 2);

        } catch (err) {
          uploadMessage.textContent = 'Грешка: ' + err.message;
          uploadMessage.className = 'auth-message error';
        }
      }

      if (uploadBtn) {
        uploadBtn.addEventListener('click', function (e) {
          e.preventDefault();
          uploadAndDetect();
        });
      }
    });
  </script>
</body>
</html>
